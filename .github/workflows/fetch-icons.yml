name: Fetch Icons

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  fetch-icons:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/fetch-icons') }}
    runs-on: ubuntu-latest
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view "${{ github.event.issue.number }}" \
            --json headRepositoryOwner,headRepository,headRefName)
          OWNER=$(echo "$PR_JSON" | jq -r '.headRepositoryOwner.login')
          REPO=$(echo "$PR_JSON" | jq -r '.headRepository.name')
          echo "head_repo=${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: gem install mini_magick

      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          path: pr-source

      - run: ruby .github/scripts/fetch-logos.rb
        env:
          PR_DIR: pr-source

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fetch logos"
          repository: pr-source
          branch: ${{ steps.pr.outputs.head_ref }}
