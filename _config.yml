title: scripts-underground
description: Proxmox scripts — upstream picks, community additions, fork-friendly
baseurl: ""
url: "https://scripts-underground.com"


permalink: pretty

collections:
  lxc:
    output: true
    permalink: /lxc/:slug/
  addon:
    output: true
    permalink: /addon/:slug/
  pve:
    output: true
    permalink: /pve/:slug/
  vm:
    output: true
    permalink: /vm/:slug/

defaults:
  - scope:
      path: ""
      type: lxc
    values:
      layout: app
      collection_label: lxc
  - scope:
      path: ""
      type: addon
    values:
      layout: app
      collection_label: addon
  - scope:
      path: ""
      type: pve
    values:
      layout: app
      collection_label: pve
  - scope:
      path: ""
      type: vm
    values:
      layout: app
      collection_label: vm

plugins:
  - jekyll-github-metadata
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
