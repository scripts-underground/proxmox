<div class="collection-index">
  <h1><a href="/" class="back-arrow">←</a> {{ include.title }}</h1>

  <div class="cat-filter-bar filter-bar">
    <input type="text" class="cat-search filter-input" placeholder="Search...">
    <span class="cat-count filter-count"></span>
    <span id="cat-sort" class="cat-sort"></span>
  </div>

  <div class="cat-grid-3">
  {% for item in site[include.collection] limit:20 %}
    {% include script_card.html item=item %}
  {% endfor %}
  </div>
</div>

<script>
(function(){
  var type = "{{ include.collection }}";
  var grid = document.querySelector(".cat-grid-3");
  var search = document.querySelector(".cat-search");
  var count = document.querySelector(".cat-count");
  var bar = document.querySelector(".cat-filter-bar");
  var sortEl = document.getElementById("cat-sort");
  var sortMode = "date";
  var filterTag = null;

  window.setF = function(t) {
    filterTag = filterTag === t ? null : t;
    render();
  };

  window.toggleSort = function(t) {
    sortMode = sortMode === "date" ? "name" : "date";
    render();
  };

  window.render = function() {
    var q = (search.value || "").toLowerCase();
    var items = scripts.filter(function(s) { return s.type === type; });
    var f = items.filter(function(s) {
      if (filterTag && (s.tags || []).indexOf(filterTag) < 0) return false;
      if (!q) return true;
      return s.title.toLowerCase().indexOf(q) >= 0 || s.slug.indexOf(q) >= 0 || (s.tags || []).some(function(t) { return t.toLowerCase().indexOf(q.replace(/^#/, '')) >= 0; });
    });
    f.sort(function(a, b) {
      if (sortMode === "date") {
        var d = (b.updated_at || "").localeCompare(a.updated_at || "");
        return d !== 0 ? d : a.title.toLowerCase().localeCompare(b.title.toLowerCase());
      }
      var n = a.title.toLowerCase().localeCompare(b.title.toLowerCase());
      return n !== 0 ? n : (b.updated_at || "").localeCompare(a.updated_at || "");
    });
    count.textContent = f.length + " / " + items.length;
    sortEl.innerHTML = window.sortBtns(sortMode, type);
    if (filterTag) {
      count.innerHTML = count.textContent + ' <span class="active-filter" onclick="setF(\'' + filterTag + '\')">#' + filterTag + ' <span class="active-filter-close">×</span></span>';
    }
    grid.innerHTML = f.map(function(s) { return cardHTML(s, scripts.indexOf(s)); }).join("");
  };

  search.addEventListener("input", render);

  fetch("/scripts.json").then(function(r) { return r.json(); }).then(function(d) {
    scripts = d.scripts;
    bar.style.display = "flex";
    render();
  });
})();
</script>
